<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>เข้าสู่ระบบออฟไลน์</title>
  <style>
    :root {
      --brand: #af101a;
      --brand-dark: #800c13;
      --gold: #8a6900;
      --ink: #211716;
      --muted: #6f5652;
      --line: #f1dddd;
      --paper: #ffffff;
      --bg: #faf9f8;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 10%, rgba(175,16,26,.08), transparent 30%),
        radial-gradient(circle at 90% 88%, rgba(253,192,3,.10), transparent 34%),
        var(--bg);
      color: var(--ink);
      font-family: "Sukhumvit Set", "Tahoma", sans-serif;
      user-select: none;
    }

    .screen {
      height: 100%;
      padding: 18px 18px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      width: 100%;
      text-align: center;
      padding-top: 8px;
    }

    .logo {
      width: 112px;
      height: 112px;
      border-radius: 999px;
      object-fit: cover;
      background: #fff;
      border: 2px solid var(--brand);
      box-shadow: 0 12px 24px rgba(175,16,26,.14);
    }

    h1 {
      margin: 10px 0 0;
      color: var(--ink);
      font-size: 28px;
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--brand);
      font-size: 15px;
      font-weight: 1000;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff2f3;
      border: 1px solid #efc6ca;
      color: var(--brand);
      font-size: 13px;
      font-weight: 1000;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--brand);
    }

    .notice {
      display: none;
      width: 100%;
      margin: 8px 0 0;
      padding: 10px 12px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #f1c5c5;
      color: var(--brand);
      font-size: 13px;
      font-weight: 1000;
      line-height: 1.35;
    }

    .panel {
      width: 100%;
      max-width: 390px;
      margin: 14px auto 0;
      padding: 17px;
      border-radius: 34px;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.9);
      box-shadow: 0 24px 70px rgba(0,0,0,.045);
      backdrop-filter: blur(16px);
    }

    .pin-box {
      height: 58px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(0,0,0,.02);
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid #decaca;
      background: #fff;
    }

    .dot.on {
      border-color: var(--brand);
      background: var(--brand);
      box-shadow: 0 0 0 5px rgba(175,16,26,.08);
    }

    .err {
      height: 22px;
      margin-top: 9px;
      text-align: center;
      color: var(--brand);
      font-size: 13px;
      font-weight: 1000;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 8px;
    }

    .key {
      position: relative;
      height: 74px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 28px;
      font-weight: 1000;
      cursor: pointer;
      touch-action: manipulation;
    }

    .key .pot {
      position: absolute;
      inset: 1px;
      border-radius: 999px;
      background: var(--brand);
      border: 2px solid var(--brand-dark);
      box-shadow: 0 5px 0 var(--brand-dark), 0 10px 18px rgba(175,16,26,.18);
    }

    .key span {
      position: relative;
      z-index: 1;
      text-shadow: 0 2px 4px rgba(0,0,0,.45);
    }

    .key:active .pot {
      transform: translateY(3px) scale(.98);
      box-shadow: 0 2px 0 var(--brand-dark), 0 6px 12px rgba(175,16,26,.14);
    }

    .key.alt .pot {
      background: #fff;
      border-color: #e5d6d4;
      box-shadow: 0 4px 0 #d6c7c5, 0 8px 14px rgba(0,0,0,.05);
    }

    .key.alt span {
      color: var(--brand);
      font-size: 16px;
      text-shadow: none;
    }

    .foot {
      max-width: 340px;
      color: var(--muted);
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      line-height: 1.38;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="brand">
      <img class="logo" src="file:///android_res/drawable/logo.jpg" alt="ตี๋อ้วน สุกี้ชาบู">
      <h1>ตี๋อ้วน สุกี้ชาบู</h1>
      <div class="sub">หลังบ้านผู้ดูแลระบบ</div>
      <div class="badge">โหมดออฟไลน์</div>
      <div id="notice" class="notice"></div>
    </section>

    <section class="panel">
      <div class="pin-box" aria-label="PIN">
        <i class="dot"></i><i class="dot"></i><i class="dot"></i>
        <i class="dot"></i><i class="dot"></i><i class="dot"></i>
      </div>
      <div id="err" class="err"></div>
      <div class="keypad">
        <button class="key" onclick="n('1')"><i class="pot"></i><span>1</span></button>
        <button class="key" onclick="n('2')"><i class="pot"></i><span>2</span></button>
        <button class="key" onclick="n('3')"><i class="pot"></i><span>3</span></button>
        <button class="key" onclick="n('4')"><i class="pot"></i><span>4</span></button>
        <button class="key" onclick="n('5')"><i class="pot"></i><span>5</span></button>
        <button class="key" onclick="n('6')"><i class="pot"></i><span>6</span></button>
        <button class="key" onclick="n('7')"><i class="pot"></i><span>7</span></button>
        <button class="key" onclick="n('8')"><i class="pot"></i><span>8</span></button>
        <button class="key" onclick="n('9')"><i class="pot"></i><span>9</span></button>
        <button class="key alt" onclick="clearPin()"><i class="pot"></i><span>ล้าง</span></button>
        <button class="key" onclick="n('0')"><i class="pot"></i><span>0</span></button>
        <button class="key alt" onclick="back()"><i class="pot"></i><span>ลบ</span></button>
      </div>
    </section>

    <div class="foot">ใช้สำหรับเปิดโต๊ะและพิมพ์ QR เมื่อเครื่อง SUNMI ไม่มีอินเทอร์เน็ต</div>
  </main>

  <script>
    var pin = '';
    var notice = new URLSearchParams(location.search).get('notice') || '';
    if (notice) {
      var noticeEl = document.getElementById('notice');
      noticeEl.textContent = notice;
      noticeEl.style.display = 'block';
    }

    function render() {
      var dots = document.querySelectorAll('.dot');
      dots.forEach(function(dot, index) {
        dot.classList.toggle('on', index < pin.length);
      });
    }

    function n(value) {
      if (pin.length >= 6) return;
      pin += value;
      document.getElementById('err').textContent = '';
      render();
      if (pin.length === 6) login();
    }

    function back() {
      pin = pin.slice(0, -1);
      render();
    }

    function clearPin() {
      pin = '';
      document.getElementById('err').textContent = '';
      render();
    }

    function login() {
      var result = AndroidPrinter.offlineLogin(pin);
      if (result === 'ok') {
        location.href = 'offline-qr://open';
        return;
      }
      document.getElementById('err').textContent = 'รหัส PIN ไม่ถูกต้อง';
      setTimeout(clearPin, 650);
    }
  </script>
</body>
</html>
